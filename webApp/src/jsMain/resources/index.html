<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Continuum — Monitoreo clínico continuo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #0D1117; }
    #ComposeTarget { width: 100%; height: 100vh; }
  </style>
</head>
<body>
  <canvas id="ComposeTarget"></canvas>

  <script type="module">
    // skiko.mjs uses a top-level `await loadSkikoWASM()` so this dynamic
    // import suspends until the WASM runtime is fully initialised.
    // We then copy every export (org_jetbrains_skia_*, GL, etc.) onto
    // globalThis so that skiko-kjs.js — bundled inside webApp.js — can
    // reference them as plain globals, which is what Kotlin/JS expects.
    const { loadedWasm } = await import('./skiko.mjs');
    Object.assign(globalThis, loadedWasm);

    const s = document.createElement('script');
    s.src = 'webApp.js';
    document.body.appendChild(s);
  </script>
</body>
</html>
