<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Continuum — Monitoreo clínico continuo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #0D1117; }
    #ComposeTarget { width: 100%; height: 100vh; }
  </style>
</head>
<body>
  <canvas id="ComposeTarget"></canvas>

  <script>
    // Pre-define Module BEFORE skiko.js loads so Emscripten picks up our
    // onRuntimeInitialized callback. When skiko.wasm is fully ready, we
    // dynamically inject webApp.js — this guarantees all Skiko native
    // functions (org_jetbrains_skia_*) exist before Compose touches them.
    window.Module = {
      onRuntimeInitialized: function () {
        var s = document.createElement('script');
        s.src = 'webApp.js';
        document.body.appendChild(s);
      }
    };
  </script>
  <script src="skiko.js"></script>
</body>
</html>
