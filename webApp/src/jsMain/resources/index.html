<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Continuum — Monitoreo clínico continuo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #0D1117; }
    #ComposeTarget { width: 100%; height: 100vh; }
  </style>
</head>
<body>
  <canvas id="ComposeTarget"></canvas>

  <script>
    // Use skiko.js (MODULARIZE=0): it creates _malloc, org_jetbrains_skia_*
    // and all other WASM exports as global `var` declarations.
    //
    // skiko.js internally overwrites Module['onRuntimeInitialized'] for its
    // own Kotlin init, but it never touches Module.postRun.
    // Emscripten calls postRun[] AFTER onRuntimeInitialized completes, so
    // all globals are set by the time our callback injects webApp.js.
    window.Module = {
      postRun: [function () {
        var s = document.createElement('script');
        s.src = 'webApp.js';
        document.body.appendChild(s);
      }]
    };
  </script>
  <script src="skiko.js"></script>
</body>
</html>
